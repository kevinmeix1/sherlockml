name: sherlockml

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - python
      - -m
      - uvicorn
      - api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8788"
    environment:
      PYTHONUNBUFFERED: "1"
      SHERLOCKML_ARTIFACTS_DIR: /app/artifacts
      SHERLOCKML_SEED: "20260718"
    ports:
      - "8788:8788"
    volumes:
      - ./artifacts:/app/artifacts
      - ./runtime:/app/runtime
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8788/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: "no"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - python
      - -m
      - streamlit
      - run
      - dashboard/app.py
      - --server.address=0.0.0.0
      - --server.port=8502
    profiles:
      - dashboard
    environment:
      PYTHONUNBUFFERED: "1"
      SHERLOCKML_API_URL: http://api:8788
    ports:
      - "8502:8502"
    depends_on:
      api:
        condition: service_healthy
    restart: "no"
